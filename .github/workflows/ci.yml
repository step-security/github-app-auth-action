name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: yarn
      - name: Install Dependencies
        run: yarn install --immutable
      - name: Check Format
        run: yarn format:check
      - name: Lint
        run: yarn lint
      - name: Test
        run: yarn ci-test

